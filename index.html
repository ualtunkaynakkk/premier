                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 leading-tight">PC Premier 3A2Ö</h1>
                                    <p className="text-sm text-gray-500">Bölge & Mağaza Performans Paneli</p>
                                </div>
                            </div>
                            <div className="hidden sm:block text-right">
                                <span className="text-xs font-semibold bg-penti-pinkLight text-penti-pink px-3 py-1 rounded-full">
                                    <i className="fas fa-circle-dot mr-1 text-[10px]"></i> 1. Operasyon HGO %
                                </span>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <KpiCard title="Toplam Hedef" value={formatNum(summary.target)} icon="fa-bullseye" colorClass="bg-blue-100 text-blue-600" delay="0s" />
                            <KpiCard title="Gerçekleşen Satış" value={formatNum(summary.actual)} icon="fa-shopping-bag" colorClass="bg-green-100 text-green-600" delay="0.1s" />
                            <KpiCard title="Genel HGO %" value={`%${formatHgo(summary.hgo)}`} icon="fa-chart-line" colorClass="bg-penti-pinkLight text-penti-pink" delay="0.2s" />
                        </div>
                        <div className="mb-10 fade-in" style={{animationDelay: '0.3s'}}>
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <h2 className="text-lg font-bold text-gray-800">Bölge Müdürleri Performansı</h2>
                                    <p className="text-sm text-gray-500">Detaylarını görmek istediğin bölge müdürüne tıkla.</p>
                                </div>
                                {selectedBM && (
                                    <button onClick={() => setSelectedBM(null)} className="text-sm text-penti-pink hover:text-penti-dark font-medium transition-colors bg-pink-50 px-3 py-1.5 rounded-lg">
                                        <i className="fas fa-times mr-1"></i> Filtreyi Temizle
                                    </button>
                                )}
                            </div>
                            <div className="flex flex-row justify-center items-end gap-2 sm:gap-6 mb-8 pt-6 sm:pt-10 px-2 h-52 sm:h-64 border-b-2 border-gray-200">
                                <PodiumCard rank={2} bm={top3[0]} isSelected={selectedBM === top3[0]?.name} onClick={(name) => setSelectedBM(name === selectedBM ? null : name)} />
                                <PodiumCard rank={1} bm={top3[1]} isSelected={selectedBM === top3[1]?.name} onClick={(name) => setSelectedBM(name === selectedBM ? null : name)} />
                                <PodiumCard rank={3} bm={top3[2]} isSelected={selectedBM === top3[2]?.name} onClick={(name) => setSelectedBM(name === selectedBM ? null : name)} />
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                {otherBMs.map((bm, idx) => (
                                    <OtherBMCard key={bm.name} rank={idx + 4} bm={bm} isSelected={selectedBM === bm.name} onClick={(name) => setSelectedBM(name === selectedBM ? null : name)} />
                                ))}
                            </div>
                        </div>
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in" style={{animationDelay: '0.4s'}}>
                            <div className="p-5 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4 bg-gray-50/50">
                                <h2 className="text-lg font-bold text-gray-800">{selectedBM ? `${selectedBM} Mağazaları` : 'Tüm Mağazalar'}</h2>
                                <div className="relative w-full sm:w-72">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i className="fas fa-search text-gray-400 text-sm"></i>
                                    </div>
                                    <input type="text" placeholder="Mağaza adı ara..." className="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-penti-pink/50 focus:border-penti-pink transition-colors" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className="overflow-x-auto custom-scrollbar max-h-[500px]">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-gray-50 sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Mağaza Adı</th>
                                            <th className="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Bölge Müdürü</th>
                                            <th className="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Hedef</th>
                                            <th className="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Gerçekleşen</th>
                                            <th className="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">HGO %</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredStores.length > 0 ? (
                                            filteredStores.map((item, index) => (
                                                <tr key={index} className="hover:bg-gray-50/80 transition-colors">
                                                    <td className="py-3 px-6 text-sm font-medium text-gray-800">
                                                        {item.store}
                                                        {item.hgo > 15 && <i className="fas fa-fire ml-2 text-orange-500" title="Yüksek Performans!"></i>}
                                                    </td>
                                                    <td className="py-3 px-6 text-sm text-gray-500">{item.bm}</td>
                                                    <td className="py-3 px-6 text-sm text-gray-600 text-right font-medium">{formatNum(item.target)}</td>
                                                    <td className="py-3 px-6 text-sm text-gray-800 text-right font-bold">{formatNum(item.actual)}</td>
                                                    <td className="py-3 px-6 min-w-[150px]">
                                                        <div className="flex items-center gap-3">
                                                            <span className={`text-sm font-bold w-12 ${item.hgo === 0 ? 'text-gray-400' : 'text-penti-pink'}`}>%{formatHgo(item.hgo)}</span>
                                                            <div className="flex-1"><ProgressBar value={item.hgo} max={60} /></div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr>
                                                <td colSpan="5" className="py-12 text-center text-gray-500">
                                                    <i className="fas fa-box-open text-3xl mb-3 text-gray-300"></i>
                                                    <p>Aradığın kritere uygun mağaza bulunamadı.</p>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
